server:
  port: 8089

weather:
  api:
    key: ${WEATHER_API_KEY}
    base-url: https://api.weatherapi.com/v1

spring:
  application:
    name: spring-ai-tools

  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: meta/llama-3.3-70b-instruct
          temperature: 1.0
          top-p: 1.0
          max-tokens: 4096
          stream-usage: false
    mcp:
      client:
        initialized-clients-timeout: 60s
        request-timeout: 30s
        stdio:
          connections:
            filesystem-mcp:
              command: "cmd"
              args:
                - "/c"
                - "npx"
                - "-y"
                - "@modelcontextprotocol/server-filesystem"
                - "D:\\spring-ai"


  datasource:
    url: jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── H2 Console ───────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console


logging:
  level:
    root: INFO
    com.syscho.ai: DEBUG
    org.springframework.ai.mcp: DEBUG          # ← add
    io.modelcontextprotocol: DEBUG             # ← add
    org.springframework.ai.chat.client.advisor: DEBUG
