server:
  port: 8089

spring:
  application:
    name: spring-ai-chat-memory

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2:1b
        options:
          temperature: 0.7
          num-ctx: 4096
      embedding:
        model: nomic-embed-text

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

  # ── DataSource (H2) ──────────────────────────────────
  datasource:
    url: jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── H2 Console ───────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── Schema + Data Init ───────────────────────────────
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  # ── JPA ──────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.syscho.ai: DEBUG
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG

