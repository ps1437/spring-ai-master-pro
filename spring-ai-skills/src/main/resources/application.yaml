server:
  port: 8089

spring:
  application:
    name: spring-ai-skills-chat
  ai:
    openai:
      api-key: ${NVIDIA_API_KEY}   # use env var, not hardcoded!
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: openai/gpt-oss-20b
          temperature: 1.0
          top-p: 1.0
          max-tokens: 4096
          stream-usage: false
  datasource:
    url: jdbc:h2:file:./data/chatdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

agent:
  skills:
    resources: classpath:/.agent/skills

logging:
  level:
    root: ERROR