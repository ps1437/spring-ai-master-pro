server:
  port: 8088

spring:
  application:
    name: spring-ollama-rag
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    ollama:
      chat:
        model: llama3.2:1b
      embedding:
        model: mxbai-embed-large
    vectorstore:
      qdrant:
        initialize-schema: true
        host: localhost
        port: 6334
        collection-name: syscho-tech

  datasource:
    url: jdbc:h2:mem:ragdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      schema-locations: classpath:schema.sql
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG